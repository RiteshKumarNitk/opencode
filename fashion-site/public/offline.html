<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Fashion Store</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { text-align: center; max-width: 400px; }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { color: #1e293b; font-size: 24px; margin-bottom: 10px; }
    p { color: #64748b; font-size: 16px; line-height: 1.5; margin-bottom: 20px; }
    button { background: #ff3f6c; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; }
    button:hover { background: #e6365a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry - your shopping experience is still available!</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
